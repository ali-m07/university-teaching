  <text x="320" y="32" text-anchor="middle" fill="#ffffff" font-family="Segoe UI,Arial,sans-serif" font-size="17" font-weight="700">Four Archetypes</text>
  <text x="320" y="382" text-anchor="middle" fill="#8899aa" font-size="11">Maturity × Turbulence matrix</text>
