<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Method</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Vazirmatn:wght@100;300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body data-advanced-method="futurpreneurship">
    <canvas id="particles-canvas"></canvas>
    <header class="main-header">
        <div class="logo">
            <span class="logo-icon"><i data-lucide="compass"></i></span>
            <span class="logo-text">FORESIGHT <span class="highlight">HUB</span></span>
        </div>
        <nav class="nav-links"></nav>
        <div class="header-actions">
            <a href="fitness.html#assessment" class="btn-primary-sm" data-i18n="nav.assess">ارزیابی</a>
        </div>
    </header>

    <section class="container" style="padding-top:130px;padding-bottom:20px;text-align:center;">
        <span class="section-tag" style="background:rgba(255,255,255,0.05);color:var(--color-i);" data-i18n="advancedPage.futurpreneurship.heroTag"></span>
        <h1 style="font-size:2.3rem;color:#fff;margin:12px 0;" data-i18n="advancedPage.futurpreneurship.heroTitle"></h1>
        <p style="max-width:760px;margin:0 auto;color:var(--text-secondary);line-height:1.7;" data-i18n="advancedPage.futurpreneurship.heroSub" data-i18n-html></p>
    </section>

    <div class="container">
        <div id="method-history"></div>
        <div id="lesson-section" data-lesson-key="futurpreneurship"></div>
    </div>

    <section class="container" style="padding-bottom:50px;">
        <div class="glass-card" style="padding:32px;margin-bottom:32px;">
            <h2 id="adv-intro-title" style="color:#fff;font-size:1.3rem;margin-bottom:12px;"></h2>
            <p id="adv-intro" style="color:var(--text-secondary);line-height:1.75;"></p>
        </div>
        <div id="method-pillars-grid" class="hub-cards-grid" style="margin-bottom:32px;"></div>
        <div class="workspace-grid" style="grid-template-columns:1fr 1fr;gap:24px;">
            <div class="glass-card" style="padding:24px;border-inline-start:3px solid var(--color-i);">
                <h3 id="adv-gap-title" style="color:#fff;font-size:1.1rem;margin-bottom:10px;"></h3>
                <p id="adv-gap" style="font-size:0.9rem;color:var(--text-secondary);line-height:1.7;"></p>
            </div>
            <div class="glass-card" style="padding:24px;">
                <h3 id="adv-case-title" style="color:#fff;font-size:1.1rem;margin-bottom:10px;"><i data-lucide="rocket" style="vertical-align:middle;margin-inline-end:6px;color:var(--color-i);"></i> Case</h3>
                <p id="adv-case" style="font-size:0.9rem;color:var(--text-secondary);line-height:1.7;"></p>
            </div>
        </div>
        <p style="text-align:center;margin-top:32px;">
            <a href="./" class="btn-ghost-sm"><i data-lucide="arrow-right"></i> <span data-i18n="hubAdvanced.catalogLink">کاتالوگ</span></a>
        </p>
    </section>

    <footer class="main-footer">
        <div class="footer-container container" style="padding-bottom:20px;">
            <div class="footer-info">
                <div class="footer-logo"><span class="logo-icon"><i data-lucide="compass"></i></span><span class="logo-text">FORESIGHT <span class="highlight">HUB</span></span></div>
                <p data-i18n="footer.desc"></p>
            </div>
        </div>
        <div class="footer-bottom"><p data-i18n="footer.copyright"></p></div>
    </footer>

    <script src="../js/core/paths.js"></script>    <script src="../js/core/i18n.js"></script>
    <script src="../js/core/load-locales.js"></script>
    <script src="../js/core/i18n-render.js"></script>
    <script src="../js/core/founders.js"></script>
    <script src="../js/core/ui/lesson-ui.js"></script>
    <script src="../js/core/ui/advanced-ui.js"></script>
    <script src="../js/core/shared.js"></script>
    <script src="../js/core/main.js"></script>
    <script src="../js/core/animation.js"></script>
</body>
</html>
