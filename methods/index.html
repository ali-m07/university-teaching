<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Methods Catalog | کاتالوگ متدها</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Vazirmatn:wght@100;300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css?v=20250628c">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <canvas id="particles-canvas"></canvas>
    <header class="main-header">
        <div class="logo">
            <span class="logo-icon"><i data-lucide="compass"></i></span>
            <span class="logo-text">FORESIGHT <span class="highlight">HUB</span></span>
        </div>
        <nav class="nav-links"></nav>
        <div class="header-actions">
            <a href="index.html" class="btn-primary-sm" data-i18n="nav.methods">متدها</a>
        </div>
    </header>

    <section class="container page-hero">
        <span class="section-tag" id="methods-hero-tag" data-i18n="methodsIndex.heroTag">کاتالوگ متدها</span>
        <h1 id="methods-hero-title" data-i18n="methodsIndex.heroTitle">متدهای آینده‌پژوهی</h1>
        <p id="methods-hero-sub" class="page-hero-sub" data-i18n="methodsIndex.heroSub"></p>
    </section>

    <section class="container page-content">
        <div class="glass-card catalog-note">
            <p id="methods-note" data-i18n="methodsIndex.note" data-i18n-html></p>
        </div>

        <div id="catalog-root"></div>

        <p style="text-align:center;margin-top:40px;">
            <a href="../" class="btn-ghost-sm"><i data-lucide="sparkles"></i> <span data-i18n="nav.home">خانه</span></a>
        </p>
    </section>

    <footer class="main-footer">
        <div class="footer-container container" style="padding-bottom:20px;">
            <div class="footer-info">
                <div class="footer-logo"><span class="logo-icon"><i data-lucide="compass"></i></span><span class="logo-text">FORESIGHT <span class="highlight">HUB</span></span></div>
                <p data-i18n="footer.desc"></p>
            </div>
        </div>
        <div class="footer-bottom"><p data-i18n="footer.copyright"></p></div>
    </footer>

    <script src="../js/core/paths.js"></script>
    <script src="../js/core/i18n.js"></script>
    <script src="../js/core/load-locales.js"></script>
    <script src="../js/core/i18n-render.js"></script>
    <script src="../js/core/ui/catalog-ui.js"></script>
    <script src="../js/core/shared.js"></script>
    <script src="../js/core/main.js"></script>
    <script src="../js/core/animation.js"></script>
