<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>Strategic Foresight Hub | علی منصوری</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Vazirmatn:wght@100;300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css?v=3">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
</head>
<body>
    <canvas id="particles-canvas"></canvas>

    <header class="main-header">
        <div class="logo">
            <span class="logo-icon"><i data-lucide="compass"></i></span>
            <span class="logo-text">FORESIGHT <span class="highlight">HUB</span></span>
        </div>
        <nav class="nav-links"></nav>
        <div class="header-actions">
            <a href="methods/" class="btn-primary-sm" data-i18n="nav.methods">متدها</a>
        </div>
    </header>

    <section id="hero" class="hero-section" style="min-height: 70vh; padding-top: 120px;">
        <div class="hero-content">
            <div class="badge-container">
                <span class="badge"><i data-lucide="sparkles"></i> <span data-i18n="index.badge">آینده‌پژوهی استراتژیک</span></span>
            </div>
            <h1 class="hero-title" data-i18n="index.heroTitle" data-i18n-html>STRATEGIC FORESIGHT<br>HUB</h1>
            <p class="hero-subtitle" data-i18n="index.heroSub">سایت شخصی علی منصوری. معرفی، مقالات، و متدهای آینده‌پژوهی.</p>
            <div class="hero-meta">
                <div class="meta-item">
                    <span class="meta-icon"><i data-lucide="user"></i></span>
                    <span class="meta-val">علی منصوری</span>
                </div>
                <div class="meta-item">
                    <span class="meta-icon"><i data-lucide="graduation-cap"></i></span>
                    <span class="meta-label" data-i18n="index.student">دانشجوی دکتری آینده‌پژوهی، دانشگاه تهران</span>
                </div>
            </div>
            <div style="margin-top: 28px; display: flex; flex-wrap: wrap; gap: 12px;">
                <a href="about/" class="btn-primary-sm"><i data-lucide="user"></i> <span data-i18n="nav.about">درباره من</span></a>
                <a href="articles/" class="btn-ghost-sm"><i data-lucide="newspaper"></i> <span data-i18n="nav.articles">مقالات</span></a>
                <a href="methods/" class="btn-ghost-sm"><i data-lucide="library"></i> <span data-i18n="nav.methods">متدها</span></a>
            </div>
        </div>
        <div class="hero-visual">
            <div class="sphere-container">
                <div class="sphere-glow"></div>
                <div class="sphere-core"></div>
                <div class="orbit-1"></div>
                <div class="orbit-2"></div>
                <div class="orbit-3"></div>
            </div>
        </div>
    </section>

    <section class="container brand-section" style="padding-bottom: 24px;">
        <div class="glass-card brand-card" style="padding: 40px; border-inline-start: 4px solid var(--color-f);">
            <div class="section-header" style="margin-bottom: 20px;">
                <span class="section-tag" data-i18n="brand.tag">علی منصوری</span>
                <h2 data-i18n="brand.heroTitle">علی منصوری</h2>
                <p data-i18n="brand.heroSub" style="max-width: 720px; margin: 12px auto 0; color: var(--text-secondary); line-height: 1.7;"></p>
            </div>
            <p data-i18n="brand.bioP1" data-i18n-html style="max-width: 820px; margin: 0 auto 14px; line-height: 1.85; color: var(--text-secondary);"></p>
            <p data-i18n="brand.bioP2" data-i18n-html style="max-width: 820px; margin: 0 auto 24px; line-height: 1.85; color: var(--text-secondary);"></p>
            <div id="brand-focus-grid" class="hub-cards-grid" style="margin-bottom: 24px;"></div>
            <div style="display: flex; flex-wrap: wrap; gap: 12px; justify-content: center;">
                <a href="https://ali-m07.github.io/resume/" target="_blank" rel="noopener noreferrer" class="btn-primary-sm"><i data-lucide="file-text"></i> <span data-i18n="brand.ctaResume">رزومه</span></a>
                <a href="articles/" class="btn-ghost-sm"><i data-lucide="pen-line"></i> <span data-i18n="brand.articlesLink">مقالات</span></a>
                <a href="methods/" class="btn-ghost-sm"><i data-lucide="library"></i> <span data-i18n="brand.methodsLink">متدها</span></a>
            </div>
        </div>
    </section>

    <section class="container site-overview-section" style="padding-bottom: 80px;">
        <div class="glass-card" style="padding: 48px; border: 1px solid rgba(0, 229, 255, 0.12);">
            <div class="section-header" style="text-align: center; margin-bottom: 32px;">
                <span class="section-tag" data-i18n="index.overviewTag">محتوای سایت</span>
                <h2 data-i18n="index.overviewTitle">اینجا چه چیزهایی هست؟</h2>
            </div>
            <p data-i18n="index.overviewP1" data-i18n-html style="max-width: 820px; margin: 0 auto 16px; line-height: 1.85; color: var(--text-secondary);"></p>
            <p data-i18n="index.overviewP2" data-i18n-html style="max-width: 820px; margin: 0 auto 36px; line-height: 1.85; color: var(--text-secondary);"></p>
            <div id="overview-features-grid" class="hub-cards-grid"></div>
        </div>
    </section>

    <footer class="main-footer">
        <div class="footer-container container" style="padding-bottom: 20px;">
            <div class="footer-info">
                <div class="footer-logo">
                    <span class="logo-icon"><i data-lucide="compass"></i></span>
                    <span class="logo-text">FORESIGHT <span class="highlight">HUB</span></span>
                </div>
                <p data-i18n="footer.desc"></p>
            </div>
        </div>
        <div class="footer-bottom">
            <p data-i18n="footer.copyright"></p>
        </div>
    </footer>

    <script src="js/core/paths.js?v=3"></script>
    <script src="js/core/i18n.js?v=3"></script>
    <script src="js/core/load-locales.js?v=3"></script>
    <script src="js/core/i18n-render.js?v=3"></script>
    <script src="js/core/shared.js?v=3"></script>
    <script src="js/core/animation.js?v=3"></script>
    <script src="js/core/main.js?v=3"></script>
</body>
</html>
