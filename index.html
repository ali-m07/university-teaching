<!DOCTYPE html>

<html lang="fa" dir="rtl">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">

    <title>Strategic Foresight Hub | علی منصوری</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Vazirmatn:wght@100;300;400;500;700;900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css?v=2">

    <script src="https://unpkg.com/lucide@latest"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

</head>

<body>

    <canvas id="particles-canvas"></canvas>



    <header class="main-header">

        <div class="logo">

            <span class="logo-icon"><i data-lucide="compass"></i></span>

            <span class="logo-text">FORESIGHT <span class="highlight">HUB</span></span>

        </div>

        <nav class="nav-links"></nav>

        <div class="header-actions">

            <a href="methods/" class="btn-primary-sm" data-i18n="nav.methods">متدها</a>

        </div>

    </header>



    <section id="hero" class="hero-section" style="min-height: 75vh; padding-top: 120px;">

        <div class="hero-content">

            <div class="badge-container">

                <span class="badge"><i data-lucide="sparkles"></i> <span data-i18n="index.badge">کلاس درس آینده‌پژوهی</span></span>

            </div>

            <h1 class="hero-title" data-i18n="index.heroTitle" data-i18n-html>STRATEGIC FORESIGHT<br>HUB</h1>

            <p class="hero-subtitle" data-i18n="index.heroSub">کلاس درس دیجیتال علی منصوری — آموزش تعاملی متدهای آینده‌پژوهی و foresight راهبردی.</p>

            <div class="hero-meta">

                <div class="meta-item">

                    <span class="meta-icon"><i data-lucide="user"></i></span>

                    <span class="meta-label" data-i18n="index.presenter">مدرس:</span>

                    <span class="meta-val">علی منصوری</span>

                </div>

                <div class="meta-item">

                    <span class="meta-icon"><i data-lucide="graduation-cap"></i></span>

                    <span class="meta-label" data-i18n="index.student">دانشجوی دکتری آینده‌پژوهی · دانشگاه تهران</span>

                </div>

            </div>

            <div style="margin-top: 28px; display: flex; flex-wrap: wrap; gap: 12px;">

                <a href="methods/" class="btn-primary-sm"><i data-lucide="library"></i> <span data-i18n="index.ctaMethods">مشاهده همه متدها</span></a>

                <a href="https://ali-m07.github.io/resume/" target="_blank" rel="noopener noreferrer" class="btn-ghost-sm"><i data-lucide="file-text"></i> <span data-i18n="brand.ctaResume">رزومه</span></a>

            </div>

        </div>

        <div class="hero-visual">

            <div class="sphere-container">

                <div class="sphere-glow"></div>

                <div class="sphere-core"></div>

                <div class="orbit-1"></div>

                <div class="orbit-2"></div>

                <div class="orbit-3"></div>

            </div>

        </div>

    </section>



    <section class="container site-overview-section" style="padding: 20px 0 80px;">

        <div class="glass-card" style="padding: 48px; border: 1px solid rgba(0, 229, 255, 0.12);">

            <div class="section-header" style="text-align: center; margin-bottom: 32px;">

                <span class="section-tag" data-i18n="index.overviewTag">درباره پورتال</span>

                <h2 data-i18n="index.overviewTitle">این سایت چیست؟</h2>

            </div>

            <p data-i18n="index.overviewP1" data-i18n-html style="max-width: 820px; margin: 0 auto 16px; line-height: 1.85; color: var(--text-secondary);"></p>

            <p data-i18n="index.overviewP2" data-i18n-html style="max-width: 820px; margin: 0 auto 36px; line-height: 1.85; color: var(--text-secondary);"></p>

            <div id="overview-features-grid" class="hub-cards-grid" style="margin-bottom: 36px;"></div>

            <p style="text-align: center; color: var(--text-secondary); font-size: 0.92rem; max-width: 640px; margin: 0 auto 28px; line-height: 1.7;" data-i18n="index.overviewP3" data-i18n-html></p>

            <div style="text-align: center;">

                <a href="methods/" class="btn-primary-sm"><i data-lucide="library"></i> <span data-i18n="index.ctaMethods">مشاهده همه متدها</span></a>

            </div>

        </div>

    </section>



    <footer class="main-footer">

        <div class="footer-container container" style="padding-bottom: 20px;">

            <div class="footer-info">

                <div class="footer-logo">

                    <span class="logo-icon"><i data-lucide="compass"></i></span>

                    <span class="logo-text">FORESIGHT <span class="highlight">HUB</span></span>

                </div>

                <p data-i18n="footer.desc"></p>

            </div>

        </div>

        <div class="footer-bottom">

            <p data-i18n="footer.copyright"></p>

        </div>

    </footer>



    <script src="js/core/paths.js?v=2"></script>

    <script src="js/core/i18n.js?v=2"></script>

    <script src="js/core/load-locales.js?v=2"></script>

    <script src="js/core/i18n-render.js?v=2"></script>

    <script src="js/core/shared.js?v=2"></script>

    <script src="js/core/animation.js?v=2"></script>

    <script src="js/core/main.js?v=2"></script>

</body>

</html>
