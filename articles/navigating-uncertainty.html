<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جهت یابی در عدم قطعیت | Navigating Uncertainty</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Vazirmatn:wght@100;300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <canvas id="particles-canvas"></canvas>

    <header class="main-header">
        <div class="logo">
            <span class="logo-icon"><i data-lucide="compass"></i></span>
            <span class="logo-text">FORESIGHT <span class="highlight">HUB</span></span>
        </div>
        <nav class="nav-links"></nav>
        <div class="header-actions">
            <a href="../articles/" class="btn-primary-sm"><i data-lucide="arrow-left"></i> <span data-i18n="nav.articles">مقالات</span></a>
        </div>
    </header>

    <main class="container article-body">
        <section class="article-hero">
            <div class="article-hero-copy">
                <span class="section-tag" data-i18n="articleUncertainty.tag">مقاله</span>
                <h1 data-i18n="articleUncertainty.title">جهت یابی در عدم قطعیت</h1>
                <p data-i18n="articleUncertainty.subtitle"></p>
                <div class="article-meta">
                    <span data-i18n="articleUncertainty.date"></span>
                    <span>FORESIGHT HUB</span>
                    <span data-i18n="articleUncertainty.readTime"></span>
                </div>
            </div>
            <figure class="founder-portrait-card">
                <img src="../assets/founders/lotfi-zadeh.jpg" alt="Lotfi A. Zadeh" width="720" height="430">
                <figcaption>
                    <strong>Lotfi A. Zadeh</strong>
                    <span data-i18n="articleUncertainty.founderCaption">بنیان گذار منطق فازی و نظریه مجموعه های فازی</span>
                </figcaption>
            </figure>
        </section>

        <article class="glass-card article-content">
            <div data-i18n="articleUncertainty.body" data-i18n-html></div>
        </article>
    </main>

    <footer class="main-footer">
        <div class="footer-container container" style="padding-bottom:20px;">
            <div class="footer-info">
                <div class="footer-logo">
                    <span class="logo-icon"><i data-lucide="compass"></i></span>
                    <span class="logo-text">FORESIGHT <span class="highlight">HUB</span></span>
                </div>
                <p data-i18n="footer.desc"></p>
            </div>
            <div class="footer-profile glass-card">
                <div class="profile-header">
                    <div class="profile-avatar"><i data-lucide="user"></i></div>
                    <div class="profile-title">
                        <h4>علی منصوری</h4>
                        <p data-i18n="footer.role"></p>
                    </div>
                </div>
                <div class="profile-links">
                    <a href="https://ali-m07.github.io/resume/" target="_blank" rel="noopener noreferrer" class="profile-link-btn">
                        <i data-lucide="file-text"></i> <span data-i18n="footer.resume"></span>
                    </a>
                </div>
            </div>
        </div>
        <div class="footer-bottom">
            <p data-i18n="footer.copyright"></p>
        </div>
    </footer>

    <script src="../js/core/paths.js"></script>
    <script src="../js/core/i18n.js"></script>
    <script src="../js/core/load-locales.js"></script>
    <script src="../js/core/i18n-render.js"></script>
    <script src="../js/core/shared.js"></script>
    <script src="../js/core/main.js"></script>
    <script src="../js/core/animation.js"></script>
</body>
</html>
