<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Articles | مقالات</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Vazirmatn:wght@100;300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <canvas id="particles-canvas"></canvas>

    <header class="main-header">
        <div class="logo">
            <span class="logo-icon"><i data-lucide="compass"></i></span>
            <span class="logo-text">FORESIGHT <span class="highlight">HUB</span></span>
        </div>
        <nav class="nav-links"></nav>
        <div class="header-actions">
            <a href="../methods/fitness.html#assessment" class="btn-primary-sm" data-i18n="nav.assess">ارزیابی بلوغ</a>
        </div>
    </header>

    <section class="container" style="padding-top:130px;padding-bottom:30px;text-align:center;">
        <span class="section-tag" data-i18n="articlesPage.tag">مقالات</span>
        <h1 style="font-size:2.2rem;color:#fff;margin:12px 0;" data-i18n="articlesPage.title">یادداشت‌ها و مقالات</h1>
        <p style="max-width:640px;margin:0 auto;color:var(--text-secondary);line-height:1.7;" data-i18n="articlesPage.sub"></p>
    </section>

    <section class="container" style="padding-bottom:80px;max-width:980px;">
        <div id="articles-list"></div>
        <div id="articles-empty" class="glass-card" style="padding:24px;text-align:center;margin-top:24px;">
            <h3 style="color:#fff;margin-bottom:8px;" data-i18n="articlesPage.emptyTitle">به‌زودی</h3>
            <p style="color:var(--text-secondary);font-size:0.9rem;line-height:1.6;" data-i18n="articlesPage.emptyDesc"></p>
        </div>
    </section>

    <footer class="main-footer">
        <div class="footer-container container" style="padding-bottom:20px;">
            <div class="footer-info">
                <div class="footer-logo">
                    <span class="logo-icon"><i data-lucide="compass"></i></span>
                    <span class="logo-text">FORESIGHT <span class="highlight">HUB</span></span>
                </div>
                <p data-i18n="footer.desc"></p>
            </div>
            <div class="footer-profile glass-card">
                <div class="profile-header">
                    <div class="profile-avatar"><i data-lucide="user"></i></div>
                    <div class="profile-title">
                        <h4>علی منصوری</h4>
                        <p data-i18n="footer.role"></p>
                    </div>
                </div>
                <div class="profile-links">
                    <a href="https://ali-m07.github.io/resume/" target="_blank" rel="noopener noreferrer" class="profile-link-btn">
                        <i data-lucide="file-text"></i> <span data-i18n="footer.resume"></span>
                    </a>
                </div>
            </div>
        </div>
        <div class="footer-bottom">
            <p data-i18n="footer.copyright"></p>
        </div>
    </footer>

    <script src="../js/core/paths.js"></script>    <script src="../js/core/i18n.js"></script>
    <script src="../js/core/load-locales.js"></script>
    <script src="../js/core/i18n-render.js"></script>
    <script src="../js/core/shared.js"></script>
    <script src="../js/core/main.js"></script>
    <script src="../js/core/animation.js"></script>
</body>
</html>
