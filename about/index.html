<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About | FORESIGHT HUB</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Vazirmatn:wght@100;300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css?v=20250627b">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <canvas id="particles-canvas"></canvas>

    <header class="main-header">
        <div class="logo">
            <span class="logo-icon"><i data-lucide="compass"></i></span>
            <span class="logo-text">FORESIGHT <span class="highlight">HUB</span></span>
        </div>
        <nav class="nav-links"></nav>
        <div class="header-actions">
            <a href="../methods/" class="btn-primary-sm" data-i18n="nav.methods">متدها</a>
        </div>
    </header>

    <section class="container page-hero">
        <span class="section-tag" data-i18n="aboutPage.tag">درباره</span>
        <h1 data-i18n="aboutPage.title">درباره من</h1>
        <p data-i18n="aboutPage.sub"></p>
    </section>

    <section class="container page-content">
        <div class="glass-card" style="padding:40px;max-width:820px;margin:0 auto;">
            <h2 style="color:#fff;font-size:1.25rem;margin-bottom:12px;" data-i18n="aboutPage.missionTitle">پس‌زمینه</h2>
            <p data-i18n="aboutPage.mission" data-i18n-html style="line-height:1.8;color:var(--text-secondary);margin-bottom:28px;"></p>

            <h2 style="color:#fff;font-size:1.25rem;margin-bottom:12px;" data-i18n="aboutPage.researchFocusTitle">تمرکز پژوهشی</h2>
            <ul id="about-research-list" style="line-height:1.9;color:var(--text-secondary);margin-bottom:28px;padding-inline-start:20px;"></ul>

            <h2 style="color:#fff;font-size:1.25rem;margin-bottom:12px;" data-i18n="aboutPage.technicalFocusTitle">تمرکز فنی</h2>
            <ul id="about-technical-list" style="line-height:1.9;color:var(--text-secondary);margin-bottom:28px;padding-inline-start:20px;"></ul>

            <p data-i18n="aboutPage.closingNote" style="line-height:1.8;color:var(--text-primary);font-size:1.05rem;margin-bottom:28px;border-inline-start:3px solid var(--color-f);padding-inline-start:16px;"></p>

            <h2 style="color:#fff;font-size:1.25rem;margin-bottom:12px;" data-i18n="aboutPage.eduTitle">تحصیلات</h2>
            <p data-i18n="aboutPage.edu" data-i18n-html style="line-height:1.8;color:var(--text-secondary);margin-bottom:28px;"></p>
            <h2 style="color:#fff;font-size:1.25rem;margin-bottom:12px;" data-i18n="aboutPage.contactTitle">ارتباط</h2>
            <p data-i18n="aboutPage.contact" style="line-height:1.8;color:var(--text-secondary);margin-bottom:20px;"></p>
            <a href="https://ali-m07.github.io/resume/" target="_blank" rel="noopener noreferrer" class="btn-primary-sm">
                <i data-lucide="external-link"></i> <span data-i18n="nav.cv">CV</span>
            </a>
        </div>
    </section>

    <footer class="main-footer">
        <div class="footer-container container" style="padding-bottom:20px;">
            <div class="footer-info">
                <div class="footer-logo">
                    <span class="logo-icon"><i data-lucide="compass"></i></span>
                    <span class="logo-text">FORESIGHT <span class="highlight">HUB</span></span>
                </div>
                <p data-i18n="footer.desc"></p>
            </div>
        </div>
        <div class="footer-bottom">
            <p data-i18n="footer.copyright"></p>
        </div>
    </footer>

    <script src="../js/core/paths.js?v=13"></script>
    <script src="../js/core/i18n.js?v=13"></script>
    <script src="../js/core/load-locales.js?v=13"></script>
    <script src="../js/core/i18n-render.js?v=13"></script>
    <script src="../js/core/shared.js?v=13"></script>
    <script src="../js/core/main.js?v=13"></script>
    <script src="../js/core/animation.js?v=13"></script>
</body>
</html>
